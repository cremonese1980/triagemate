spring:
  application:
    name: triagemate-triage
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: triagemate-triage-test
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest

    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    listener:
      concurrency: 3

    properties:
      spring.json.trusted.packages: com.triagemate.contracts.*
      spring.json.use.type.headers: true
      spring.json.value.default.type: com.triagemate.contracts.events.EventEnvelope

  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
      group:
        readiness:
          include: kafka,outboxBacklog

  health:
    status:
      order: DOWN,OUT_OF_SERVICE,DEGRADED,UP,UNKNOWN
      http-mapping:
        DOWN: 503
        OUT_OF_SERVICE: 503
        DEGRADED: 200
    probes:
      enabled: true

  metrics:
    export:
      prometheus:
        enabled: true

triagemate:
  kafka:
    topics:
      input-received: triagemate.ingest.input-received.v1
      decision-made: triagemate.triage.decision-made.v1
    consumer:
      group-id: triagemate-triage-test
      retry:
        backoff-ms: 200
        max-retries: 2

  outbox:
    batch-size: 10
    max-attempts: 3
    base-backoff-millis: 500
    max-backoff-millis: 5000
    poll-interval-ms: 500
    initial-delay-ms: 500
    lock-duration-seconds: 10
