spring:
  autoconfigure:
    exclude: org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/triagemate
    username: triagemate
    password: triagemate

  kafka:
    bootstrap-servers: localhost:29092

triagemate:

  policy:
    version: "2.1.0"

  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:ollama}
    model: ${AI_MODEL:llama3}
    model-version: ${AI_MODEL_VERSION:latest}
    allowed-classifications: ${AI_ALLOWED_CLASSIFICATIONS:NORMAL, DEVICE_ERROR}
    timeouts:
      advisory: 5s
    cost:
      max-per-decision-usd: 0.05
      max-daily-usd: 100.00
      estimated-cost-usd: 0.003
    validation:
      min-confidence-for-suggestion: 0.70
      min-confidence-for-override: 0.85

logging:
  level:
    org.springframework.boot.autoconfigure.jdbc: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,prometheus,metrics
  endpoint:
    env:
      show-values: always