spring:
  autoconfigure:
    exclude: org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/triagemate
    username: triagemate
    password: triagemate

  kafka:
    bootstrap-servers: localhost:29092

triagemate:
  ai:
    enabled: true
    provider: ollama
    timeouts:
      advisory: 30s

logging:
  level:
    org.springframework.boot.autoconfigure.jdbc: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    env:
      show-values: always