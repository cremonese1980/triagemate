spring:
  application:
    name: triagemate-triage
  autoconfigure:
    exclude: org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration
  lifecycle:
    timeout-per-shutdown-phase: 30s

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 500
          temperature: 0.0
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3}
          temperature: 0.0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      fail-fast: true

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: triagemate-triage
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest

    listener:
      concurrency: 3

    properties:
      spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
      spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

      spring.json.trusted.packages: com.triagemate.contracts.*
      spring.json.use.type.headers: false
      spring.json.value.default.type: com.triagemate.contracts.events.EventEnvelope

server:
  port: 8082
  shutdown: graceful

logging:
  level:
    root: INFO
    org.apache.catalina: WARN
    org.apache.coyote: WARN
    org.hibernate.validator: WARN

triagemate:
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:anthropic}
    allowed-classifications: ${AI_ALLOWED_CLASSIFICATIONS:}
    timeouts:
      advisory: 5s
    cost:
      max-per-decision-usd: 0.05
      max-daily-usd: 100.00

  kafka:
    topics:
      input-received: triagemate.ingest.input-received.v1
      decision-made: triagemate.triage.decision-made.v1
    consumer:
      group-id: triagemate-triage
      retry:
        backoff-ms: 1000
        max-retries: 3

  outbox:
    batch-size: 20
    max-attempts: 3
    base-backoff-millis: 1000
    max-backoff-millis: 300000
    poll-interval-ms: 2000
    initial-delay-ms: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator

  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
      group:
        readiness:
          include: kafka,outboxBacklog

  health:
    status:
      order: DOWN,OUT_OF_SERVICE,DEGRADED,UP,UNKNOWN
      http-mapping:
        DOWN: 503
        OUT_OF_SERVICE: 503
        DEGRADED: 200
    probes:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:docker}

    distribution:
      percentiles-histogram:
        triagemate.decision.latency.seconds: true
      slo:
        triagemate.decision.latency.seconds: 10ms,50ms,100ms,250ms,500ms,1s,2500ms,5s,10s